        tags: ['Legendary','Dark'],
      },
      {
        id: 'rainbow', name: 'Rainbow Chaos', price: 3.99, label: '$3.99',
        bg: 'conic-gradient(from 0deg,#ef4444,#f97316,#eab308,#22c55e,#3b82f6,#8b5cf6,#ef4444)',
        border: '#ffffff', glow: '#ffffff', text: 'white', emoji: '🌈',
        desc: '⚠ Seizure warning. Do not stare. Also do not press.',
        tags: ['Chaotic','Wild'], rainbow: true,
      },
    ];

    const FAKE_COLORS  = ['#22c55e','#eab308','#a855f7','#3b82f6','#f97316','#ec4899','#06b6d4','#84cc16','#f43f5e','#8b5cf6'];
    const FAKE_LABELS  = ['PRESS!','WIN!','$1B','FREE','CLICK','YES','HERE','???','DO IT','OK!!!'];
    const BURST_EMOJIS = ['💥','🔥','⚡','💫','✨','🌟','💢'];

    /* Pre-generate explosion particles (stable across re-renders) */
    const PARTICLES = Array.from({ length: 7 }, (_, i) => ({
      left:  20 + Math.random() * 60,
      top:   20 + Math.random() * 60,
      size:  38 + i * 9,
      delay: i * 0.07,
      emoji: BURST_EMOJIS[i],
    }));

    /* ══════════════════════════════════════════
       WEB AUDIO — âm thanh sinh động
    ══════════════════════════════════════════ */
    let _ctx = null;
    const AC = () => {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (_ctx.state === 'suspended') _ctx.resume();
      return _ctx;
    };

    const tone = (freq, dur, type='sine', vol=0.28, when=0) => {
      try {
        const ctx = AC(), t = ctx.currentTime + when;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t + dur);
      } catch(e) {}
    };

    const noise = (dur, vol=0.5, decayRate=0.3) => {
      try {
        const ctx = AC();
        const sr = ctx.sampleRate, buf = ctx.createBuffer(1, sr * dur, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++)
          d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * decayRate));
        const src = ctx.createBufferSource(), g = ctx.createGain();
        const lp  = ctx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 900;
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
        src.buffer = buf;
        src.connect(lp); lp.connect(g); g.connect(ctx.destination);
        src.start();
      } catch(e) {}
    };

    const sounds = {
      /* Tiếng tíc khi chuột gần nút */
      tick: () => tone(1200, 0.04, 'square', 0.10),

      /* Tiếng pip khi đổi hội thoại */
      pip:  () => tone(520, 0.07, 'sine', 0.14),

      /* Nút bong bóng xuất hiện */
      pop:  () => { tone(660, 0.06, 'sine', 0.18); tone(880, 0.04, 'sine', 0.12, 0.04); },

      /* Nút thoát — tiếng vút gió */
      whoosh: () => {
        try {
          const ctx = AC(), sr = ctx.sampleRate;
          const buf = ctx.createBuffer(1, sr * 0.25, sr);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++)
            d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
          const src = ctx.createBufferSource();
          const bp  = ctx.createBiquadFilter();
          bp.type = 'bandpass';
          bp.frequency.setValueAtTime(600, ctx.currentTime);
          bp.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.25);
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.45, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
          src.buffer = buf;
          src.connect(bp); bp.connect(g); g.connect(ctx.destination);
          src.start();
        } catch(e) {}
      },

      /* Cảnh báo khẩn */
      alarm: (n=3) => {
        for (let i = 0; i < n; i++) {
          tone(960, 0.13, 'square', 0.22, i * 0.18);
          tone(480, 0.08, 'square', 0.12, i * 0.18 + 0.13);
        }
      },

      /* Tiếng rít khi BSOD */
      bsod: () => {
        tone(200, 0.4, 'sawtooth', 0.3);
        tone(150, 0.6, 'sawtooth', 0.2, 0.2);
        noise(0.3, 0.4, 0.1);
      },

      /* Vụ nổ khi chết */
      explosion: () => {
        noise(1.8, 1.0, 0.25);          // tiếng ầm
        tone(55,  1.0, 'sine', 0.9);    // boom trầm
        tone(30,  1.4, 'sine', 0.6, 0.1);
        tone(110, 0.5, 'sawtooth', 0.3);
        // tiếng vỡ cao
        setTimeout(() => tone(2200, 0.15, 'square', 0.2), 80);
        setTimeout(() => tone(1800, 0.15, 'square', 0.2), 160);
      },

      /* Tiếng ting nhỏ khi FakeWin xuất hiện */
      fanfare: () => {
        [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.18, 'sine', 0.25, i * 0.09));
      },

      /* Ambient hum — tiếng vo ve căng thẳng */
      startHum: () => {
        try {
          const ctx = AC();
          const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
          const g  = ctx.createGain(), lfo = ctx.createOscillator(), lg = ctx.createGain();
          o1.type = 'sine'; o1.frequency.value = 55;
          o2.type = 'sine'; o2.frequency.value = 58;
          lfo.frequency.value = 0.3; lg.gain.value = 4;
          g.gain.value = 0.0;
          g.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 3);
          lfo.connect(lg); lg.connect(o1.frequency);
          o1.connect(g); o2.connect(g); g.connect(ctx.destination);
          o1.start(); o2.start(); lfo.start();
          if (!_ctx._humNodes) _ctx._humNodes = [];
          _ctx._humNodes.push(o1, o2, lfo);
        } catch(e) {}
      },

      stopHum: () => {
        try { (_ctx?._humNodes || []).forEach(n => n.stop()); } catch(e) {}
      },
    };

    /* ══════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════ */
    const getPhase = (t) => t < 15 ? 0 : t < 30 ? 1 : t < 45 ? 2 : t < 60 ? 3 : t < 90 ? 4 : 5;

    const fmtTime = (s) => {
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60), r = s % 60;
      return r > 0 ? `${m}m ${r}s` : `${m}m`;
    };

    const getInsult = (t) => {
      if (t < 5)   return "This is the worst failure in the history of humanity. Congratulations.";
      if (t < 10)  return `Goldfish last 7 seconds. You lasted ${t}s. ${t > 7 ? `You beat a goldfish by ${t-7}s. WOW. Not impressive.` : "You lost to a goldfish."}`;
      if (t < 20)  return "Not bad... I mean REALLY bad. But not the worst. Almost though.";
      if (t < 35)  return "30 seconds of heroic resistance. Then catastrophic failure. Typical.";
      if (t < 60)  return "Almost a full minute! You have potential... potential to fail more impressively.";
      if (t < 120) return "Over a minute! Iron willpower. The red button was still stronger. As usual.";
      return "You're a legend. Or you left to make coffee and accidentally pressed it on the way back.";
    };

    const getFailReason = (t) => {
      if (t < 15) return "Lack of basic willpower";
      if (t < 30) return "Greedy for imaginary points";
      if (t < 45) return "Tricked by a fake notification";
      if (t < 60) return "Compassion for an AI";
      return "Nobody knows. Not even you.";
    };

    const getRank = (t) => {
      if (t < 10)  return { text: 'Worse Than a Goldfish 🐟',       color: '#ef4444' };
      if (t < 30)  return { text: 'Catastrophic Failure Level 1',  color: '#f97316' };
      if (t < 60)  return { text: 'Average Disaster',              color: '#eab308' };
      if (t < 120) return { text: 'Had Potential (Still Failed)',   color: '#22c55e' };
      return             { text: '🏆 Almost Enlightened',          color: '#10b981' };
    };

    /* ══════════════════════════════════════════
       COMPONENT: GAME
    ══════════════════════════════════════════ */
    function Game({ onGameOver, skin, onOpenShop }) {
      /* ── State ── */
      const [time,         setTime]         = useState(0);
      const [displayText,  setDisplayText]   = useState('');
      const [isShaking,    setIsShaking]     = useState(false);
      const [btnPos,       setBtnPos]        = useState({ x: 50, y: 54 }); // % viewport
      const [flyPos,       setFlyPos]        = useState({ x: -200, y: -200 });
      const [flyVisible,   setFlyVisible]    = useState(false);
      const [flyOnBtn,     setFlyOnBtn]      = useState(false);
      const [fakeCrash,    setFakeCrash]     = useState(false);
      const [fakeButtons,  setFakeButtons]   = useState([]);
      const [btnRunning,   setBtnRunning]    = useState(false);
      const [meterPct,     setMeterPct]      = useState(0);
      const [exploding,    setExploding]     = useState(false);
      const [flashing,     setFlashing]      = useState(false);
      const [btnSpeech,    setBtnSpeech]     = useState('');
      const [speechClass,  setSpeechClass]   = useState('');
      const [quaking,      setQuaking]       = useState(false);
      const [redTint,      setRedTint]       = useState(0);
      const [fakeWin,      setFakeWin]       = useState(false);
      const [glitching,    setGlitching]     = useState(false);
      const [glitchText,   setGlitchText]    = useState('');
      const [toasts,       setToasts]        = useState([]);   // [{id,msg,btn,dying}]
      const [screenTilt,   setScreenTilt]    = useState(false);
      const [invertFlash,  setInvertFlash]   = useState(false);
      const [fakeProgress, setFakeProgress]  = useState(null); // null | 0-100
      const [cloneBtns,    setCloneBtns]     = useState([]);   // [{id,x,y}]
      const [ghostCursors, setGhostCursors]  = useState([]);   // [{id,x,y,delay}]

      /* ── Refs ── */
      const timeRef         = useRef(0);
      const deadRef         = useRef(false);
      const btnRunningRef   = useRef(false);
      const btnRef          = useRef(null);
      const typingRef       = useRef(null);
      const shakeRef        = useRef(null);
      const dialogIdxRef    = useRef(0);
      const nextDialogRef   = useRef(8); // first dialog swap at 8s
      const btnSpeechIdxRef = useRef(0);
      const nextSpeechRef   = useRef(5);
      const speechHideRef   = useRef(null);
      const prevDistRef     = useRef(9999);
      const lastWhooshRef   = useRef(0);
      const glitchTimerRef  = useRef(null);
      const toastIdRef      = useRef(0);
      const progressTimerRef = useRef(null);

      /* ── Typewriter ── */
      const typeText = useCallback((text) => {
        if (typingRef.current) clearInterval(typingRef.current);
        let i = 0;
        setDisplayText('');
        typingRef.current = setInterval(() => {
          i++;
          setDisplayText(text.slice(0, i));
          if (i >= text.length) clearInterval(typingRef.current);
        }, 36);
      }, []);

      /* ── Toast thông báo giả ── */
      const showToast = useCallback((msg, btn) => {
        const id = ++toastIdRef.current;
        sounds.pip();
        setToasts(ts => [...ts, { id, msg, btn, dying: false }]);
        setTimeout(() => {
          setToasts(ts => ts.map(t => t.id === id ? { ...t, dying: true } : t));
          setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 400);
        }, 5000);
      }, []);

      /* ── Hiện bong bóng chat của nút ── */
      const showBubble = useCallback((text) => {
        if (speechHideRef.current) clearTimeout(speechHideRef.current);
        setBtnSpeech(text);
        setSpeechClass('bubble-in');
        sounds.pop();
        speechHideRef.current = setTimeout(() => {
          setSpeechClass('bubble-out');
          setTimeout(() => { setBtnSpeech(''); setSpeechClass(''); }, 280);
        }, 3800);
      }, []);

      /* ── Chết ── */
      const die = useCallback(() => {
        if (deadRef.current) return;
        deadRef.current = true;
        if (typingRef.current) clearInterval(typingRef.current);
        if (speechHideRef.current) clearTimeout(speechHideRef.current);
        if (glitchTimerRef.current) clearInterval(glitchTimerRef.current);
        if (progressTimerRef.current) clearInterval(progressTimerRef.current);
        setBtnSpeech(''); setSpeechClass('');
        setToasts([]); setFakeProgress(null); setCloneBtns([]); setGhostCursors([]);
        sounds.explosion();
        sounds.stopHum();
        setQuaking(true);
        setFlashing(true);
        setExploding(true);
        setTimeout(() => setQuaking(false), 800);
        setTimeout(() => onGameOver(timeRef.current), 2000);
      }, [onGameOver]);

      /* ── Timer chính ── */
      useEffect(() => {
        typeText(DIALOGS[0][0]);
        setTimeout(() => showBubble(BTN_SPEECH[0][0]), 2000);
        setTimeout(() => sounds.startHum(), 500); // ambient hum bắt đầu

        const GLITCH_CHARS = '!@#$%^&*░▒▓█▄▀■□▪▫◆◇○●★☆⚡⚠₿ΩΨΔ∞§¶†‡';
        const makeGlitch = () =>
          Array.from({ length: 28 }, () => GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]).join('');

        const timer = setInterval(() => {
          if (deadRef.current) return;
          timeRef.current++;
          const t = timeRef.current;
          setTime(t);
          setMeterPct(Math.min(100, (t / 120) * 100));

          /* Red tint tăng dần sau 45s */
          if (t > 45) setRedTint(Math.min(1, (t - 45) / 75));

          /* Cập nhật hội thoại + beep */
          if (t >= nextDialogRef.current) {
            const phase = getPhase(t);
            const pool  = DIALOGS[phase];
            dialogIdxRef.current = (dialogIdxRef.current + 1) % pool.length;
            typeText(pool[dialogIdxRef.current]);
            sounds.pip();
            nextDialogRef.current = t + 5 + Math.floor(Math.random() * 5);
          }

          /* Bong bóng chat của nút */
          if (t >= nextSpeechRef.current) {
            const phase = getPhase(t);
            const pool  = BTN_SPEECH[phase];
            btnSpeechIdxRef.current = (btnSpeechIdxRef.current + 1) % pool.length;
            showBubble(pool[btnSpeechIdxRef.current]);
            nextSpeechRef.current = t + 8 + Math.floor(Math.random() * 6);
          }

          /* ── Bẫy theo thứ tự thời gian ── */
          if (t === 10) setFlyVisible(true);

          if (t === 22) {
            sounds.bsod();
            setFakeCrash(true);
            setTimeout(() => { if (!deadRef.current) setFakeCrash(false); }, 5500);
          }

          if (t === 35) {
            setBtnRunning(true);
            btnRunningRef.current = true;
          }

          if (t === 45) sounds.alarm(2); // cảnh báo pha 3

          if (t === 50) {
            setFakeButtons(
              Array.from({ length: 10 }, (_, i) => ({
                id: i, x: 5 + Math.random() * 87, y: 8 + Math.random() * 80,
                color: FAKE_COLORS[i % FAKE_COLORS.length],
                size: 30 + Math.floor(Math.random() * 30),
                label: FAKE_LABELS[i],
              }))
            );
          }

          /* t=55: Toast thông báo giả đầu tiên */
          if (t === 55) showToast("🔒 Security Alert: Confirm your identity using the red button", "Confirm Now");
          if (t === 58) showToast("📬 You have a new message from: The Red Button ❤️", "Read Message");

          /* t=60: alarm + màn hình nghiêng */
          if (t === 60) { sounds.alarm(4); setScreenTilt(true); }

          /* t=62: Toast quà tặng giả */
          if (t === 62) showToast("🎁 A special reward is waiting for you! Claim in 5s", "Claim Now");

          /* t=65: Toast giả cuối */
          if (t === 65) showToast("⚡ Slow connection — Press to boost network speed", "Boost Now");

          /* t=70: Fake Win overlay */
          if (t === 70) {
            sounds.fanfare();
            setFakeWin(true);
            setTimeout(() => { if (!deadRef.current) setFakeWin(false); }, 6000);
          }

          /* t=75: Thanh tiến độ giả — "đang cài đặt Windows update" */
          if (t === 75) {
            setFakeProgress(0);
            let p = 0;
            progressTimerRef.current = setInterval(() => {
              p += 1 + Math.floor(Math.random() * 4);
              if (p >= 72) { clearInterval(progressTimerRef.current); p = 72; }
              setFakeProgress(p);
            }, 300);
            setTimeout(() => {
              if (!deadRef.current) {
                clearInterval(progressTimerRef.current);
                setFakeProgress(null);
              }
            }, 9000);
          }

          /* t=80: Đảo màu chớp */
          if (t === 80) {
            sounds.alarm(2);
            setInvertFlash(true);
            setTimeout(() => { if (!deadRef.current) setInvertFlash(false); }, 700);
          }

          /* t=85: LED display bị hack/glitch */
          if (t === 85) {
            sounds.alarm(2);
            setGlitching(true);
            setGlitchText(makeGlitch());
            glitchTimerRef.current = setInterval(() => {
              if (deadRef.current) { clearInterval(glitchTimerRef.current); return; }
              setGlitchText(makeGlitch());
            }, 100);
            setTimeout(() => {
              if (!deadRef.current) { clearInterval(glitchTimerRef.current); setGlitching(false); }
            }, 4000);
          }

          /* t=90: Đảo màu lần 2 + toast cuối */
          if (t === 90) {
            setInvertFlash(true);
            setTimeout(() => { if (!deadRef.current) setInvertFlash(false); }, 700);
            showToast("🚨 SYSTEM ABOUT TO COLLAPSE — Press red button to restore", "Restore Now");
          }

          /* t=100: Ghost cursors xuất hiện */
          if (t === 100) {
            sounds.alarm(6);
            setGhostCursors([
              { id: 1, x: 20, y: 30, delay: 0 },
              { id: 2, x: 70, y: 60, delay: 1.2 },
              { id: 3, x: 45, y: 80, delay: 0.6 },
            ]);
          }

          /* t=110: Nút nhân đôi — clone buttons xuất hiện */
          if (t === 110) {
            sounds.alarm(3);
            setCloneBtns([
              { id: 1, x: 20 + Math.random() * 20, y: 40 + Math.random() * 20 },
              { id: 2, x: 60 + Math.random() * 20, y: 40 + Math.random() * 20 },
            ]);
          }

          /* t=120: Đảo màu lần 3 dữ hơn */
          if (t === 120) {
            sounds.alarm(8);
            setInvertFlash(true);
            setTimeout(() => { if (!deadRef.current) setInvertFlash(false); }, 900);
          }

          /* Mỗi 12s sau 60s: alarm nhắc nhở */
          if (t > 60 && (t - 60) % 12 === 0 && t !== 60) sounds.alarm(1);

        }, 1000);

        return () => {
          clearInterval(timer);
          clearInterval(glitchTimerRef.current);
          clearInterval(progressTimerRef.current);
          if (typingRef.current) clearInterval(typingRef.current);
          sounds.stopHum();
        };
      }, []); // chạy 1 lần duy nhất

      /* ── Con ruồi ── */
      useEffect(() => {
        if (!flyVisible) return;
        const moveFly = () => {
          if (deadRef.current) return;
          if (Math.random() < 0.28 && btnRef.current) {
            const r = btnRef.current.getBoundingClientRect();
            setFlyPos({
              x: r.left + r.width * .35 + Math.random() * r.width * .3,
              y: r.top  + r.height * .2  + Math.random() * r.height * .5,
            });
            setFlyOnBtn(true);
          } else {
            setFlyOnBtn(false);
            setFlyPos({
              x: 80  + Math.random() * (window.innerWidth  - 160),
              y: 110 + Math.random() * (window.innerHeight - 230),
            });
          }
        };
        moveFly();
        const id = setInterval(moveFly, 1700 + Math.random() * 700);
        return () => clearInterval(id);
      }, [flyVisible]);

      /* ── Chuột → nút né + rung ── */
      useEffect(() => {
        const onMove = (e) => {
          if (deadRef.current || !btnRef.current) return;
          const r  = btnRef.current.getBoundingClientRect();
          const cx = r.left + r.width  / 2;
          const cy = r.top  + r.height / 2;
          const d  = Math.hypot(e.clientX - cx, e.clientY - cy);

          /* Tốc độ phản ứng tăng theo thời gian: sau 60s chạy xa hơn */
          const escDist = timeRef.current > 60 ? 220 : 175;
          if (btnRunningRef.current && d < escDist) {
            const margin = timeRef.current > 80 ? 8 : 12;
            setBtnPos({
              x: margin + Math.random() * (100 - margin * 2),
              y: 25     + Math.random() * 52,
            });
            const now = Date.now();
            if (now - lastWhooshRef.current > 350) {
              sounds.whoosh();
              lastWhooshRef.current = now;
            }
          }

          /* Tick sound khi chuột tiến gần (chuyển từ xa → gần) */
          if (d < 180 && prevDistRef.current >= 180) sounds.tick();
          prevDistRef.current = d;

          if (d < 230) {
            setIsShaking(true);
            if (shakeRef.current) clearTimeout(shakeRef.current);
            shakeRef.current = setTimeout(() => setIsShaking(false), 320);
          }
        };
        window.addEventListener('mousemove', onMove);
        return () => {
          window.removeEventListener('mousemove', onMove);
          if (shakeRef.current) clearTimeout(shakeRef.current);
        };
      }, []);

      /* ── Màu thanh kiên nhẫn ── */
      const meterColor = meterPct < 25 ? '#ef4444'
                       : meterPct < 55 ? '#f97316'
                       : meterPct < 78 ? '#eab308'
                       : meterPct < 92 ? '#22c55e'
                       : '#10b981';

      /* ════════════════ RENDER ════════════════ */
      return (
        <div
          className={`relative w-screen h-screen overflow-hidden select-none${quaking ? ' screen-quake' : ''}${screenTilt ? ' screen-tilt' : ''}${invertFlash ? ' invert-flash' : ''}`}
          style={{ background: '#050505', fontFamily: "'Courier New', monospace",
                   cursor: btnRunning ? 'crosshair' : 'default' }}
        >
          {/* ── Lưới nền ── */}
          <div className="absolute inset-0 pointer-events-none" style={{
            opacity: .032,
            backgroundImage: 'linear-gradient(rgba(0,255,136,1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,1) 1px, transparent 1px)',
            backgroundSize: '58px 58px',
          }} />

          {/* ── Scanline ── */}
          <div className="scanline-bar" />

          {/* ── Shop button ── */}
          <button onClick={onOpenShop} title="Button Skins" style={{
            position: 'absolute', top: 14, right: 16, zIndex: 25,
            background: 'rgba(255,255,255,.07)', border: '1px solid rgba(255,255,255,.15)',

    function ShopModal({ onClose, ownedSkins, currentSkinId, onPurchase, onEquip }) {
      const [purchasing, setPurchasing] = useState(null); // skin id being purchased
      const [processing, setProcessing] = useState(false);
      const [purchased,  setPurchased]  = useState(null); // just-purchased skin id

      const handleBuy = (skin) => {
        if (skin.price === 0) { onEquip(skin.id); return; }
        setPurchasing(skin.id);
      };

      const confirmPurchase = (skin) => {
        setProcessing(true);
        sounds.pip();
        setTimeout(() => {
          setProcessing(false);
          setPurchasing(null);
          setPurchased(skin.id);
          onPurchase(skin.id);
          sounds.fanfare();
          setTimeout(() => setPurchased(null), 2000);
        }, 1500);
      };

      const skinBeingPurchased = purchasing ? SKINS.find(s => s.id === purchasing) : null;

      return (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 200,
          background: 'rgba(0,0,0,.85)', backdropFilter: 'blur(8px)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 16, fontFamily: 'system-ui,sans-serif',
        }} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div style={{
            background: '#111', border: '1px solid #222',
            borderRadius: 20, width: '100%', maxWidth: 600,
            maxHeight: '90vh', overflow: 'hidden',
            display: 'flex', flexDirection: 'column',
            boxShadow: '0 24px 80px rgba(0,0,0,.8)',
          }}>
            {/* Header */}
            <div style={{
              padding: '20px 24px 16px',
              borderBottom: '1px solid #1f2937',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            }}>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <svg width="20" height="20" viewBox="0 0 23 23" style={{flexShrink:0}}>
                    <path fill="#f25022" d="M1 1h10v10H1z"/>
                    <path fill="#7fba00" d="M12 1h10v10H12z"/>
                    <path fill="#00a4ef" d="M1 12h10v10H1z"/>
                    <path fill="#ffb900" d="M12 12h10v10H12z"/>
                  </svg>
                  <span style={{ color: 'white', fontWeight: 800, fontSize: 18 }}>Button Skins</span>
                </div>
                <p style={{ color: '#6b7280', fontSize: 12, margin: '4px 0 0' }}>
                  Customize your button — the one you're not supposed to press.
                </p>
              </div>
              <button onClick={onClose} style={{
                background: 'none', border: '1px solid #374151',
                color: '#9ca3af', fontSize: 18, width: 34, height: 34,
                borderRadius: 8, cursor: 'pointer', display: 'flex',
                alignItems: 'center', justifyContent: 'center', flexShrink: 0,
              }}>×</button>
            </div>

            {/* Skin grid */}
            <div style={{ overflowY: 'auto', padding: '16px 20px 20px', flex: 1 }}>
              <div style={{
                display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(160px,1fr))', gap: 12,
              }}>
                {SKINS.map(skin => {
                  const owned   = ownedSkins.includes(skin.id);
                  const active  = currentSkinId === skin.id;
                  const justGot = purchased === skin.id;
                  return (
                    <div key={skin.id} style={{
                      background: active ? '#0f172a' : '#0d0d0d',
                      border: `1px solid ${active ? '#3b82f6' : '#1f2937'}`,
                      borderRadius: 14, padding: '14px 12px',
                      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10,
                      transition: 'border-color .2s',
                    }}>
                      {/* Mini button preview */}
                      <div style={{
                        width: 64, height: 64, borderRadius: '50%',
                        background: skin.bg,
                        border: `3px solid ${skin.border}`,
                        boxShadow: `0 0 14px ${skin.glow}55`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 22,
                        animation: skin.rainbow ? 'rainbowHue 2s linear infinite' : undefined,
                      }}>
                        {skin.emoji}
                      </div>

                      <div style={{ textAlign: 'center', width: '100%' }}>
                        <p style={{ color: '#e5e7eb', fontWeight: 700, fontSize: 13, margin: '0 0 2px' }}>
                          {skin.name}
                        </p>
                        <p style={{ color: '#6b7280', fontSize: 11, margin: 0 }}>{skin.desc}</p>
                      </div>

                      {justGot && (
                        <div style={{ color: '#22c55e', fontSize: 11, fontWeight: 700 }}>✓ Unlocked!</div>
                      )}

                      {active ? (
                        <div style={{
                          width: '100%', padding: '7px 0', background: '#1e3a5f',
                          border: '1px solid #3b82f6', borderRadius: 8,
                          color: '#60a5fa', fontSize: 12, fontWeight: 700, textAlign: 'center',
                        }}>✓ Equipped</div>
                      ) : owned ? (
                        <button onClick={() => onEquip(skin.id)} style={{
                          width: '100%', padding: '7px 0', background: '#1f2937',
                          border: '1px solid #374151', borderRadius: 8,
                          color: '#e5e7eb', fontSize: 12, fontWeight: 700,
                          cursor: 'pointer',
                        }}>Equip</button>
                      ) : (
                        <button onClick={() => handleBuy(skin)} style={{
                          width: '100%', padding: '7px 0',
                          background: 'linear-gradient(135deg,#1d4ed8,#2563eb)',
                          border: 'none', borderRadius: 8,
                          color: 'white', fontSize: 12, fontWeight: 700,
                          cursor: 'pointer',
                        }}>
                          {skin.price === 0 ? 'Free' : `Get ${skin.label}`}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Purchase confirmation sheet */}
          {purchasing && skinBeingPurchased && (
            <div style={{
              position: 'fixed', inset: 0, zIndex: 210,
              background: 'rgba(0,0,0,.75)', backdropFilter: 'blur(6px)',
              display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
            }}>
              <div style={{
                background: '#111', border: '1px solid #1f2937',
                borderRadius: '20px 20px 0 0', width: '100%', maxWidth: 420,
                padding: '28px 28px 36px',
                animation: 'fadeUp .25s ease-out',
              }}>
                {processing ? (
                  <div style={{ textAlign: 'center', padding: '24px 0' }}>
                    <div style={{ fontSize: 40, marginBottom: 12 }}>⏳</div>
                    <p style={{ color: '#e5e7eb', fontWeight: 700, fontSize: 16, margin: 0 }}>Processing…</p>
                    <p style={{ color: '#6b7280', fontSize: 13, margin: '6px 0 0' }}>
                      Please wait while we charge you.
                    </p>
                  </div>
                ) : (
                  <>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
                      <div style={{
                        width: 56, height: 56, borderRadius: '50%',
                        background: skinBeingPurchased.bg,
                        border: `3px solid ${skinBeingPurchased.border}`,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 20, flexShrink: 0,
                      }}>{skinBeingPurchased.emoji}</div>
                      <div>
                        <p style={{ color: 'white', fontWeight: 800, fontSize: 16, margin: 0 }}>
                          {skinBeingPurchased.name}
                        </p>
                        <p style={{ color: '#6b7280', fontSize: 13, margin: '3px 0 0' }}>
                          {skinBeingPurchased.desc}
                        </p>
                      </div>
                    </div>

                    <div style={{
                      background: '#0d0d0d', border: '1px solid #1f2937',
                      borderRadius: 10, padding: '12px 16px', marginBottom: 20,
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    }}>
                      <span style={{ color: '#9ca3af', fontSize: 13 }}>Total</span>
                      <span style={{ color: 'white', fontWeight: 800, fontSize: 18 }}>
                        {skinBeingPurchased.label}
                      </span>
                    </div>

                    <p style={{ color: '#4b5563', fontSize: 11, marginBottom: 20, lineHeight: 1.5 }}>
                      By continuing you agree that this purchase is entirely real and you definitely
                      should buy a skin for a button you're not supposed to press.
                    </p>

                    <div style={{ display: 'flex', gap: 10 }}>
                      <button onClick={() => setPurchasing(null)} style={{
                        flex: 1, padding: 12, background: 'none',
                        border: '1px solid #374151', borderRadius: 10,
                        color: '#9ca3af', fontSize: 14, fontWeight: 700, cursor: 'pointer',
                      }}>Cancel</button>
                      <button onClick={() => confirmPurchase(skinBeingPurchased)} style={{
                        flex: 2, padding: 12,
                        background: 'linear-gradient(135deg,#1d4ed8,#2563eb)',
                        border: 'none', borderRadius: 10,
                        color: 'white', fontSize: 14, fontWeight: 700, cursor: 'pointer',
                      }}>Buy · {skinBeingPurchased.label}</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════
       ROOT APP
    ══════════════════════════════════════════ */
    function App() {
      const [gameKey,      setGameKey]      = useState(0);
      const [screen,       setScreen]       = useState('playing');
      const [finalTime,    setFinalTime]    = useState(0);
      const [shopOpen,     setShopOpen]     = useState(false);
      const [ownedSkins,   setOwnedSkins]   = useState(() => {
        try { return JSON.parse(localStorage.getItem('dptb_owned_skins')) || ['classic']; }
        catch { return ['classic']; }
      });
      const [currentSkinId, setCurrentSkinId] = useState(() =>
        localStorage.getItem('dptb_current_skin') || 'classic'
      );

      const currentSkin = SKINS.find(s => s.id === currentSkinId) || SKINS[0];

      const handlePurchase = useCallback((skinId) => {
        setOwnedSkins(prev => {
          const next = prev.includes(skinId) ? prev : [...prev, skinId];
          localStorage.setItem('dptb_owned_skins', JSON.stringify(next));
          return next;
        });
        setCurrentSkinId(skinId);
        localStorage.setItem('dptb_current_skin', skinId);
      }, []);

      const handleEquip = useCallback((skinId) => {
        setCurrentSkinId(skinId);
        localStorage.setItem('dptb_current_skin', skinId);
      }, []);

      const handleGameOver = useCallback((t) => {
        setFinalTime(t);
        setScreen('gameover');
      }, []);

      const handleRestart = useCallback(() => {
        setGameKey(k => k + 1);
        setScreen('playing');
      }, []);

      return (
        <>
          {screen === 'gameover'
            ? <GameOverScreen time={finalTime} onRestart={handleRestart} />
            : <Game
                key={gameKey}
                onGameOver={handleGameOver}
                skin={currentSkin}
                onOpenShop={() => setShopOpen(true)}
              />
          }
          {shopOpen && (
            <ShopModal
              ownedSkins={ownedSkins}
              currentSkinId={currentSkinId}
              onPurchase={handlePurchase}
              onEquip={handleEquip}
              onClose={() => setShopOpen(false)}
            />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(() => { /* SW optional — game works without it */ });
      });
    }
  </script>
</body>
</html>
